services:
  - type: web
    name: dinetunis
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn DineTunis.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dinetunis-db
          property: connectionString
      - key: MONGODB_URI
        sync: false # Set this in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
